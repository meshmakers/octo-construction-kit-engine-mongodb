# Root-level CI pipeline using shared templates from octo-pipeline-templates.
#
# Phase 1 pilot 4 of the YAML migration (see octo-mesh-deployment's
# docs/pipeline-architecture-concept.md). After DEH / CK-Engine / SDK,
# this is one of the two remaining Libs in tier 2-3. No Docker, no Helm —
# pure NuGet lib that consumes the upstream CK-Engine CI's main builds via
# resources.pipelines.
#
# The build args don't reference $(OctoPublishCatalog), so the
# effectivePublishCatalog conditional block from the SDK/CK-Engine variants
# is not needed here.

name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

resources:
  pipelines:
    - pipeline: octo-construction-kit-engine
      source: octo-construction-kit-engine-CI
      trigger:
        branches:
          include:
            - main
  repositories:
    - repository: pipelineTemplates
      type: github
      name: meshmakers/octo-pipeline-templates
      endpoint: meshmakers-access-token
      ref: refs/tags/tpl-v0.4.6

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.ConstructionKit.Engine.MongoDb.sln'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
  - stage: Build
    jobs:
      - job: buildAndTest
        displayName: 'Build nuget and execute tests'
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: templates/steps/update-build-number.yml@pipelineTemplates
          - checkout: self
            clean: true
            submodules: true
          - template: templates/steps/set-version.yml@pipelineTemplates
          # §10 #7 Versions-Floor-Check pilot. CK-Mongo is the repo that hit
          # the r3.4.9 slim-NuGet-restore trap (build #34814) which inspired
          # this guard. With OctoCoreLibVersion split done at 3.4.x, declare
          # the floor here so any future Directory.Build.props edit that
          # accidentally rolls back to 3.3.* fails the build before restore.
          - template: templates/steps/verify-libs-floor.yml@pipelineTemplates
            parameters:
              coreLibFloor: '3.4'
              commFloor: '3.4'
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(SolutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: $(SolutionFile)
              arguments: '--configuration $(BuildConfiguration) --no-restore /p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPrivateGitHubApiKey=$(GitHubPAT) /p:OctoPublicGitHubApiKey=$(GitHubPAT)'
          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--configuration $(buildConfiguration) --no-restore /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              projects: |
                **/*Tests.csproj
              testRunTitle: 'CI'
          - template: templates/steps/handle-artifacts.yml@pipelineTemplates
          - template: templates/steps/push-nuget-package.yml@pipelineTemplates
