"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Query
    derivedFromCkTypeId: System/Entity
    isFinal: false
    isAbstract: false
    attributes:
      - id: System/Query.CkTypeId
        name: QueryCkTypeId
      - id: System/Query.Columns
        name: Columns
      - id: System/Query.Sorting
        name: Sorting
        isOptional: true
      - id: System/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: System/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: System/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
      - id: System/Name
        name: Name