"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: BodyTemplate
    valueType: String
  - id: BodyText
    valueType: String
  - id: SubjectTemplate
    valueType: String
  - id: SubjectText
    valueType: String
  - id: SentDateTime
    valueType: DateTime
  - id: LastTryDateTime
    valueType: DateTime
  - id: RecipientAddress
    valueType: String
  - id: ErrorText
    valueType: String
  - id: Type
    valueType: Enum
    valueCkEnumId: System.Notification/NotificationTypes
  - id: Status
    valueType: Enum
    defaultValues:
      - 0
    valueCkEnumId: System.Notification/NotificationStates
