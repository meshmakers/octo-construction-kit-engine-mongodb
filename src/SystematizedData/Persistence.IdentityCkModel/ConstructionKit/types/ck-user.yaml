"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
- typeId: User
  derivedFromCkTypeId: System/Entity
  isFinal: true
  isAbstract: false
  attributes:
  - id: System.Identity/UserName
    name: UserName    
    
  - id: System.Identity/NormalizedUserName
    name: NormalizedUserName
    
  - id: System.Identity/FirstName
    name: FirstName

  - id: System.Identity/LastName
    name: LastName    
    
  - id: System/Description
    name: Description
    
  - id: System.Identity/Email
    name: Email
    
  - id: System.Identity/NormalizedEmail
    name: NormalizedEmail
    
  - id: System.Identity/EmailConfirmed
    name: EmailConfirmed
    
  - id: System.Identity/PasswordHash
    name: PasswordHash
    
  - id: System.Identity/SecurityStamp
    name: SecurityStamp
    
  - id: System.Identity/ConcurrencyStamp
    name: ConcurrencyStamp
    
  - id: System.Identity/PhoneNumber
    name: PhoneNumber
    
  - id: System.Identity/PhoneNumberConfirmed
    name: PhoneNumberConfirmed
    
  - id: System.Identity/TwoFactorEnabled
    name: TwoFactorEnabled
    
  - id: System.Identity/LockoutEnd
    name: LockoutEnd
    
  - id: System.Identity/LockoutEnabled
    name: LockoutEnabled
    
  - id: System.Identity/AccessFailedCount
    name: AccessFailedCount
    
  - id: System.Identity/ResetPasswordOnLogin
    name: ResetPasswordOnLogin
    
  - id: System.Identity/RoleNames
    name: RoleNames
    
  - id: System.Identity/Claims
    name: Claim    
    
  - id: System.Identity/UserLogins
    name: UserLogin
    
  - id: System.Identity/UserTokens
    name: UserTokens    
    
  indexes:
  - indexType: Ascending
    fields:
    - attributeNames:
      - NormalizedEmail
      - NormalizedUserName
