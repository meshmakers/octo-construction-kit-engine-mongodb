"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
- id: BodyTemplate
  valueType: String
- id: BodyText
  valueType: String
- id: SubjectTemplate
  valueType: String
- id: SubjectText
  valueType: String
- id: SentDateTime
  valueType: DateTime
- id: LastTryDateTime
  valueType: DateTime
- id: RecipientAddress
  valueType: String
- id: ErrorText
  valueType: String
- id: Type
  valueType: Int
  selectionValues:
  - key: 1
    name: EMail
  - key: 2
    name: SMS
- id: Status
  valueType: Int
  selectionValues:
  - key: 0
    name: Pending
  - key: 1
    name: Sent
  - key: 2
    name: Error