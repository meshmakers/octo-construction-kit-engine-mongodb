"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
- id: BodyTemplate
  valueType: String
- id: BodyText
  valueType: String
  isOptional: true
- id: SubjectTemplate
  valueType: String
- id: SubjectText
  valueType: String
- id: SentDateTime
  valueType: DateTime
  isOptional: true
- id: LastTryDateTime
  valueType: DateTime
  isOptional: true
- id: RecipientAddress
  valueType: String
- id: ErrorText
  valueType: String
  isOptional: true
- id: Type
  valueType: Enum
  valueCkEnumId: System.Notification/NotificationTypes
- id: Status
  valueType: Enum
  defaultValues:
    - value: 0
  valueCkEnumId: System.Notification/NotificationStates
