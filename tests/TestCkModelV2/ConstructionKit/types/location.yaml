$schema: "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Location
    derivedFromCkTypeId: ${System}/Entity
    isAbstract: true
    attributes:
    - id: ${this}/DisplayName
      name: DisplayName

  - typeId: Continent
    description: A continent is one of several very large landmasses of the world.
    derivedFromCkTypeId: ${this}/Location

  - typeId: Country
    description: A country is a region identified as a distinct national entity in political geography.
    derivedFromCkTypeId: ${this}/Location
    attributes:
    - id: ${this}/ISOCode
      name: ISOCode
    associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/Continent

  - typeId: StateOrProvince
    description: A state is a type of administrative region in a country.
    derivedFromCkTypeId: ${this}/Location
    isFinal: true
    isAbstract: false
    associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/Country

  - typeId: District
    description: A district is a type of administrative division that, in some countries, is managed by local government.
    derivedFromCkTypeId: ${this}/Location
    associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/StateOrProvince

  - typeId: Municipality
    description: A municipality is a local administrative division having corporate status and powers of self-government or jurisdiction as granted by national and regional laws.
    derivedFromCkTypeId: ${this}/Location
    associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/District
  - typeId: HouseHold
    derivedFromCkTypeId: ${this}/Location
    description: A house hold is a group of people who live together in the same dwelling and share meals.
    associations:
    - id: ${System}/ParentChild
      targetCkTypeId: ${this}/Municipality
