"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Customer
    derivedFromCkTypeId: System/Entity
    isFinal: false
    attributes:
    - id: ${thisModel}/Contacts.Name
      name: Name
      isOptional: true
    - id: ${thisModel}/Contacts.Address
      name: Address
      isOptional: true
    - id: ${thisModel}/Contacts.EMailAddress
      name: EMailAddress
      isOptional: true
    associations:
    - id: System/Related
      targetCkTypeId: ${thisModel}/MeasuringPoint